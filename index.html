<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบชำระเงินออนไลน์</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 antialiased font-sans">

    <div class="bg-white rounded-3xl shadow-xl p-6 w-full max-w-md border border-slate-100 transition-all">
        
        <div class="flex justify-center mb-6">
            <div class="w-20 h-20 bg-slate-100 rounded-2xl flex items-center justify-center overflow-hidden border-2 border-dashed border-slate-300">
                <img src="https://placehold.co/150x150?text=LOGO" alt="Logo" class="w-full h-full object-cover">
            </div>
        </div>

        <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl p-5 text-white shadow-md relative overflow-hidden mb-6">
            <div class="absolute -right-8 -bottom-8 w-24 h-24 bg-white/10 rounded-full blur-xl"></div>
            
            <div class="flex items-center gap-4 mb-4">
                <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center overflow-hidden shrink-0">
                    <img src="https://placehold.co/100x100?text=BANK" alt="Bank Logo" class="w-full h-full object-cover">
                </div>
                <div>
                    <p class="text-xs text-blue-100 uppercase tracking-wider">บัญชีรับเงิน</p>
                    <h3 class="font-bold text-lg leading-tight">นาย สมชาย สายเปย์</h3>
                </div>
            </div>

            <div class="bg-white/10 rounded-xl p-3 flex items-center justify-between backdrop-blur-sm">
                <div>
                    <p class="text-xs text-blue-200">เลขบัญชี / พร้อมเพย์</p>
                    <p id="account-number" class="font-mono text-lg font-bold tracking-grey">0987654321</p>
                </div>
                <button onclick="copyAccountNumber()" class="bg-white/20 hover:bg-white/30 text-white p-2.5 rounded-lg transition-colors flex items-center gap-1 text-sm active:scale-95">
                    <i id="copy-icon" class="fa-regular fa-copy"></i>
                    <span id="copy-text">คัดลอก</span>
                </button>
            </div>
        </div>

        <div class="bg-slate-50 rounded-xl p-4 mb-6 border border-slate-100">
            <h4 class="text-sm font-bold text-slate-700 mb-1"><i class="fa-solid fa-circle-info text-blue-500 mr-1"></i> รายละเอียดเพิ่มเติม</h4>
            <p class="text-xs text-slate-500 leading-relaxed">กรุณาตรวจสอบยอดเงินและชื่อบัญชีก่อนกดยืนยันการโอนทุกครั้ง เมื่อโอนเงินเสร็จแล้วระบบจะแสดงหลักฐานการโอนเงินโดยอัตโนมัติ</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">จำนวนเงินที่ต้องการจ่าย (บาท)</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">฿</span>
                    <input type="number" id="amount-input" placeholder="0.00" min="0" step="0.01"
                           class="w-full pl-9 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all font-semibold text-slate-800 text-lg">
                </div>
            </div>

            <button onclick="generateQRCode()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-3.5 rounded-xl transition-colors shadow-sm active:scale-[0.99] flex items-center justify-center gap-2">
                <i class="fa-solid fa-qrcode"></i> สร้าง QR Code สแกนจ่าย
            </button>
        </div>

        <div id="qr-container" class="hidden mt-6 pt-6 border-t border-slate-100 flex flex-col items-center animate-fade-in">
            <p class="text-xs font-medium text-slate-500 mb-3">สแกนจ่ายด้วยแอปธนาคารของคุณได้ทันที</p>
            <div class="bg-white p-3 rounded-2xl shadow-inner border border-slate-100">
                <img id="qr-image" src="" alt="PromptPay QR Code" class="w-56 h-56">
            </div>
            <p id="qr-status" class="text-sm font-bold text-emerald-600 mt-3 flex items-center gap-1.5">
                <i class="fa-solid fa-spinner animate-spin"></i> รอรับยอดเงิน...
            </p>
        </div>

    </div>

    <script>
        // ฟังก์ชันคัดลอกเลขบัญชี
        function copyAccountNumber() {
            const accountNumber = document.getElementById('account-number').innerText;
            
            navigator.clipboard.writeText(accountNumber).then(() => {
                const copyText = document.getElementById('copy-text');
                const copyIcon = document.getElementById('copy-icon');
                
                // เปลี่ยนสถานะเป็นคัดลอกสำเร็จ
                copyText.innerText = "คัดลอกแล้ว!";
                copyIcon.className = "fa-solid fa-check text-emerald-300";
                
                // เปลี่ยนกลับหลังจาก 2 วินาที
                setTimeout(() => {
                    copyText.innerText = "คัดลอก";
                    copyIcon.className = "fa-regular fa-copy";
                }, 2000);
            }).catch(err => {
                alert('ไม่สามารถคัดลอกได้ กรุณาก๊อปปี้ด้วยตนเอง');
            });
        }

        // ฟังก์ชันสร้าง QR Code PromptPay
        function generateQRCode() {
            const promptpayID = "0987654321"; // เปลี่ยนเป็นเลขพร้อมเพย์ หรือ เบอร์โทรของคุณที่ผูกไว้ตรงนี้
            const amountInput = document.getElementById('amount-input').value;
            const amount = parseFloat(amountInput) || 0;

            if (amount <= 0) {
                alert("กรุณากรอกจำนวนเงินที่ถูกต้อง");
                return;
            }

            const qrContainer = document.getElementById('qr-container');
            const qrImage = document.getElementById('qr-image');

            // ใช้ API ฟรีของ PromptPay QR ในการสร้างรูปภาพ
            const qrUrl = `https://promptpay.io/${promptpayID}/${amount}.png`;
            
            // แสดงรูปภาพ QR Code
            qrImage.src = qrUrl;
            qrContainer.classList.remove('hidden');
            
            // เลื่อนหน้าจอลงมาให้เห็น QR Code (สำหรับมือถือ)
            qrContainer.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
